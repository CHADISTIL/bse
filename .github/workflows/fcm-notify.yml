name: BC Electric — FCM Notifications

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  send-notifications:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install firebase-admin
        run: npm install firebase-admin

      - name: Send FCM Notifications
        env:
          FIREBASE_PROJECT_ID: faddi-410e9
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          node << 'EOF'
          const admin = require('firebase-admin');

          const serviceAccount = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT);
          const projectId = process.env.FIREBASE_PROJECT_ID;

          admin.initializeApp({
            credential: admin.credential.cert(serviceAccount),
            databaseURL: `https://${projectId}-default-rtdb.firebaseio.com`
          });

          const db = admin.database();
          const messaging = admin.messaging();

          const titles = {
            attendance_recorded: '✅ تم تسجيل الحضور',
            attendance_edited:   '✏️ تعديل سجل الحضور',
            attendance_deleted:  '🗑️ حذف سجل الحضور',
            payment_recorded:    '💰 دفعة جديدة',
            bonus_granted:       '🎁 مكافأة جديدة',
            new_message:         '💬 رسالة جديدة',
            new_request:         '📋 طلب جديد',
            request_response:    '📩 رد على طلبك',
            special_work_added:  '⭐ عمل خاص',
            share_settled:       '🤝 توزيع الحصص',
            negative_points_warning: '⚠️ تحذير نقاط',
          };

          async function main() {
            console.log('BC Electric FCM Worker started...');

            const [notifsSnap, tokensSnap] = await Promise.all([
              db.ref('notifications').once('value'),
              db.ref('fcm_tokens').once('value')
            ]);

            const notifications = notifsSnap.val();
            const fcmTokens = tokensSnap.val();

            if (!notifications) { console.log('No notifications'); process.exit(0); }
            if (!fcmTokens) { console.log('No FCM tokens'); process.exit(0); }

            console.log(`Notifications: ${Object.keys(notifications).length}`);
            console.log(`FCM tokens: ${Object.keys(fcmTokens).join(', ')}`);

            let sentCount = 0;

            for (const [notifId, notif] of Object.entries(notifications)) {
              if (notif.fcm_sent) continue;

              const title = titles[notif.type] || 'BC Electric';
              const body = notif.message || notif.employeeName || '';
              const recipients = [];

              if (notif.forAdmin) {
                for (const [uid, d] of Object.entries(fcmTokens)) {
                  if (d.role === 'admin' && d.token) recipients.push(d.token);
                }
              }

              if (notif.forEmployee && notif.employeeId) {
                const empId = String(notif.employeeId);
                const empToken = fcmTokens[empId];
                if (empToken?.token) {
                  recipients.push(empToken.token);
                } else {
                  console.log(`No token for employee ${empId}. Available: ${Object.keys(fcmTokens).join(', ')}`);
                }
              }

              console.log(`[${notif.type}] → ${recipients.length} recipients`);

              for (const token of recipients) {
                try {
                  await messaging.send({
                    token,
                    notification: { title, body },
                    data: { tag: notif.type || 'bc-notif' },
                    android: { priority: 'high', notification: { sound: 'default', channelId: 'bc_electric' } },
                    apns: { payload: { aps: { sound: 'default', badge: 1 } } },
                    webpush: {
                      headers: { Urgency: 'high' },
                      notification: { icon: '/bse/icon-192.png', dir: 'rtl', vibrate: [200,100,200] }
                    }
                  });
                  console.log(`✅ Sent: ${title}`);
                  sentCount++;
                } catch(e) {
                  console.warn(`❌ FCM error: ${e.message}`);
                  // إذا انتهت صلاحية التوكن احذفه
                  if (e.code === 'messaging/registration-token-not-registered') {
                    const uid = Object.keys(fcmTokens).find(k => fcmTokens[k].token === token);
                    if (uid) await db.ref(`fcm_tokens/${uid}`).remove();
                    console.log(`Removed invalid token for uid: ${uid}`);
                  }
                }
              }

              await db.ref(`notifications/${notifId}/fcm_sent`).set(true);
            }

            console.log(`✅ Done. Sent ${sentCount} notifications.`);
            process.exit(0);
          }

          main().catch(e => { console.error('Fatal:', e.message); process.exit(1); });
          EOF
